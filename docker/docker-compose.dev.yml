services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: sadoj
      POSTGRES_USER: sadoj
      POSTGRES_PASSWORD: sadoj_dev_password
    ports:
      - "5432:5432"
    volumes:
      - sadoj_pgdata_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sadoj"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6380:6379"
    volumes:
      - sadoj_redisdata_dev:/data

  minio:
    image: minio/minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: sadoj_access
      MINIO_ROOT_PASSWORD: sadoj_secret_key
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - sadoj_minio_dev:/data

volumes:
  sadoj_pgdata_dev:
  sadoj_redisdata_dev:
  sadoj_minio_dev:
